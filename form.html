<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Product Review Form | Rafael Mendoza </title>
    <meta name="description" content="This is my form assignment to show I understand the concept of creating forms with get method">
    <meta name="author" content="Rafael Mendoza">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
    <script src="scripts/getdates.js" defer></script>
</head>
<body>
    <header>
        <h1> Product Review </h1>
    </header>
    <main>
        <form method="get" action="review.html" class="pr1">
            <fieldset>
                <legend>Product Name</legend>
                    <label for="product"> Product Name </label>
                    <select id="product" name="product" required>
                        <option value="" disabled selected> Choose a product ... </option>
                    </select>
            </fieldset>

            <fieldset>
                <legend> Overall Rating </legend>
                <label for="star1">
                    <input type="radio" id="star1" name="rating" value="1" required> &star; 
                </label>
                <label for="star2">
                    <input type="radio" id="star2" name="rating" value="2" required> &star; &star; 
                </label>
                <label for="star3">
                    <input type="radio" id="star3" name="rating" value="3" required> &star; &star; &star; 
                </label>
                <label for="star4">
                    <input type="radio" id="star4" name="rating" value="4" required> &star; &star; &star; &star; 
                </label>
                <label for="star5">
                    <input type="radio" id="star5" name="rating" value="5" required> &star; &star; &star; &star; &star; 
                </label>
            </fieldset>

            <fieldset>
                <legend> Date of Installation </legend>
                <label for="installDate"> Date of Installation </label>
                <input type="date" id="installDate" name="installDate" placeholder="mm/dd/yyyy" required>
            </fieldset>

            <fieldset>
                <legend> Which features did you find useful in the product? </legend>
                <div> (Check all that apply) </div>
                <label for="durability">
                    <input type="checkbox" id="durability" name="features" value="Durability"> Durability 
                </label>
                <label for="ease">
                    <input type="checkbox" id="ease" name="features" value="Ease"> Ease of Use 
                </label>
                <label for="performance">
                    <input type="checkbox" id="performance" name="features" value="Performance"> Performance 
                </label>
                <label for="design">
                    <input type="checkbox" id="design" name="features" value="Design"> Design 
                </label>
            </fieldset>

            <fieldset>
                <legend> Written Review </legend>
                <label for="review"> Written Review (Optional) </label>
                <textarea id="review" name="review"></textarea>
            </fieldset>

            <fieldset>
                <legend> Full Name </legend>
                <label for="fullname"> Your Name (Optional) </label>
                <input type="text" id="fullname" name="fullname" placeholder="John Doe">
            </fieldset>

            <input type="submit" value="Post Review">
        </form>
    </main>
    <footer>
        <p> ©️ <span id="currentyear"></span> | Rafael Mendoza | USA </p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
